## Network Diagram
![Network Diagram](architecture/network-diagram.svg)
<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Homelab Network Diagram</title>
<desc>Homelab infrastructure: ISP router, managed switch with VLANs, Proxmox VE with Windows Server 2022, Ubuntu Server, and Windows 11 client VMs</desc>

<style>
  text { font-family: Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 600; fill: #1a1a2e; }
  .ts { font-size: 12px; fill: #444; }
  .box-gray { fill: #f1efe8; stroke: #888780; }
  .box-blue { fill: #e6f1fb; stroke: #185fa5; }
  .box-teal { fill: #e1f5ee; stroke: #0f6e56; }
  .box-purple { fill: #eeedfe; stroke: #534ab7; }
  .box-amber { fill: #faeeda; stroke: #854f0b; }
  .box-container { fill: #f4f4f4; stroke: #888; }
  .arr { stroke: #555; stroke-width: 1.2; fill: none; }
  .dashed { stroke: #555; stroke-width: 1; fill: none; stroke-dasharray: 6 3; }
  @media (prefers-color-scheme: dark) {
    .th { fill: #e0e0e0; }
    .ts { fill: #aaa; }
    .box-gray { fill: #2c2c2a; stroke: #888; }
    .box-blue { fill: #042c53; stroke: #85b7eb; }
    .box-teal { fill: #04342c; stroke: #5dcaa5; }
    .box-purple { fill: #26215c; stroke: #afa9ec; }
    .box-amber { fill: #412402; stroke: #ef9f27; }
    .box-container { fill: #1a1a1a; stroke: #555; }
    .arr { stroke: #aaa; }
    .dashed { stroke: #aaa; }
  }
</style>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Internet -->
<rect x="260" y="20" width="160" height="44" rx="22" class="box-gray" stroke-width="0.5"/>
<text class="th" x="340" y="38" text-anchor="middle">Internet</text>
<text class="ts" x="340" y="54" text-anchor="middle">ISP / WAN</text>

<!-- Arrow: Internet to Router -->
<line x1="340" y1="64" x2="340" y2="100" class="arr" marker-end="url(#arrow)"/>

<!-- ISP Router -->
<rect x="220" y="100" width="240" height="56" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th" x="340" y="120" text-anchor="middle">ISP Router (Digi)</text>
<text class="ts" x="340" y="140" text-anchor="middle">Gateway · NAT · DHCP (LAN)</text>

<!-- Arrow: Router to Switch -->
<line x1="340" y1="156" x2="340" y2="192" class="arr" marker-end="url(#arrow)"/>

<!-- Managed Switch -->
<rect x="180" y="192" width="320" height="56" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="th" x="340" y="212" text-anchor="middle">TP-Link TL-SG105E (Managed Switch)</text>
<text class="ts" x="340" y="232" text-anchor="middle">802.1Q · VLAN 10 Management · VLAN 20 Lab</text>

<!-- Arrow: Switch to Proxmox -->
<line x1="340" y1="248" x2="340" y2="288" class="arr" marker-end="url(#arrow)"/>

<!-- Proxmox container -->
<rect x="30" y="288" width="620" height="300" rx="12" class="box-container" stroke-width="0.8" stroke-dasharray="4 2"/>
<text class="th" x="340" y="310" text-anchor="middle">Proxmox VE 9.2 — GMKtec G3S Mini PC (Intel N95 · 16GB RAM · 512GB SSD)</text>

<!-- VM: Windows Server -->
<rect x="48" y="325" width="250" height="120" rx="8" class="box-blue" stroke-width="0.5"/>
<text class="th" x="173" y="346" text-anchor="middle">Windows Server 2022</text>
<text class="ts" x="173" y="364" text-anchor="middle">Homelab-DC · homelab.local</text>
<text class="ts" x="173" y="381" text-anchor="middle">Active Directory DS · DNS</text>
<text class="ts" x="173" y="398" text-anchor="middle">DHCP · GPO</text>
<text class="ts" x="173" y="415" text-anchor="middle">2 vCPU · 4GB RAM · 80GB</text>
<text class="ts" x="173" y="432" text-anchor="middle">IP: x.x.x.141 (static)</text>

<!-- VM: Ubuntu Server -->
<rect x="382" y="325" width="250" height="120" rx="8" class="box-teal" stroke-width="0.5"/>
<text class="th" x="507" y="346" text-anchor="middle">Ubuntu Server 24.04 LTS</text>
<text class="ts" x="507" y="364" text-anchor="middle">AD Domain Member (realmd/SSSD)</text>
<text class="ts" x="507" y="381" text-anchor="middle">Pi-hole DNS (83,000+ blocked)</text>
<text class="ts" x="507" y="398" text-anchor="middle">WireGuard VPN Server</text>
<text class="ts" x="507" y="415" text-anchor="middle">2 vCPU · 4GB RAM</text>
<text class="ts" x="507" y="432" text-anchor="middle">IP: x.x.x.x (static)</text>

<!-- Arrow between VMs (AD domain) -->
<line x1="298" y1="385" x2="380" y2="385" class="arr" marker-end="url(#arrow)"/>
<line x1="380" y1="395" x2="298" y2="395" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="339" y="375" text-anchor="middle">AD domain</text>

<!-- VM: Win11 Client -->
<rect x="215" y="468" width="250" height="96" rx="8" class="box-purple" stroke-width="0.5"/>
<text class="th" x="340" y="488" text-anchor="middle">Windows 11 Enterprise</text>
<text class="ts" x="340" y="506" text-anchor="middle">Domain Client · GPO testing</text>
<text class="ts" x="340" y="523" text-anchor="middle">2 vCPU · 4GB RAM · 60GB</text>
<text class="ts" x="340" y="540" text-anchor="middle">IPv6 disabled (domain join fix)</text>
<text class="ts" x="340" y="557" text-anchor="middle">(powered off when not in use)</text>

<!-- Arrow: Win Server to Win11 -->
<line x1="173" y1="445" x2="285" y2="468" class="arr" marker-end="url(#arrow)"/>
<!-- Arrow: Ubuntu to Win11 -->
<line x1="507" y1="445" x2="395" y2="468" class="arr" marker-end="url(#arrow)"/>

<!-- Phone remote access -->
<rect x="530" y="100" width="130" height="56" rx="8" class="box-amber" stroke-width="0.5"/>
<text class="th" x="595" y="120" text-anchor="middle">Phone / Remote</text>
<text class="ts" x="595" y="140" text-anchor="middle">WireGuard VPN client</text>

<!-- Arrow: Phone to Ubuntu (VPN tunnel dashed) -->
<path d="M595 156 Q595 240 560 288" class="dashed" marker-end="url(#arrow-dashed)"/>
<text class="ts" x="612" y="220" text-anchor="start">VPN tunnel</text>

</svg>
